<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Carte stylisée du Maroc</title>
  <desc id="desc">Carte large du Maroc incluant les provinces du Sud, avec contexte régional.</desc>
  <defs>
